<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Bookflix - Login</title>

<style>
body{
background:#0b0b0f;
color:white;
font-family:Arial;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.box{
background:#15151d;
padding:40px;
border-radius:10px;
width:320px;
}

h1{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
background:#222;
color:white;
}

button{
width:100%;
padding:12px;
background:#e50914;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff1a1a;
}

a{
color:#aaa;
font-size:14px;
display:block;
margin-top:10px;
text-align:center;
}

#msg{
margin-top:10px;
font-size:14px;
text-align:center;
}
</style>
</head>

<body>

<div class="box">

<h1>Bookflix</h1>

<form id="loginForm">

<input
id="email"
type="email"
placeholder="Email"
required
>

<input
id="password"
type="password"
placeholder="Senha"
required
>

<button type="submit">
Entrar
</button>

</form>

<div id="msg"></div>

<a href="register.html">
Criar conta
</a>

</div>

<script src="./assets/js/auth.js"></script>

</body>
</html>
