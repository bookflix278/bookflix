<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix • Admin</title>
  <link rel="stylesheet" href="./assets/css/admin.css" />
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Painel Admin</h1>
        <div class="sub">Gerencie livros, usuários e estatísticas do Bookflix</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="location.href='index.html'">Voltar</button>
        <button class="btn btn-primary" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="grid" id="statsGrid"></div>

    <section class="panel">
      <h2>Livros</h2>
      <div id="booksTable"></div>
    </section>

    <section class="panel">
      <h2>Usuários</h2>
      <div id="usersTable"></div>
    </section>
  </div>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/admin.js"></script>
</body>
</html>
