<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bookflix • Admin</title>
  <style>
    :root{
      --bg:#07080b;
      --panel:rgba(18,21,29,.92);
      --line:rgba(255,255,255,.08);
      --text:#f2f4f8;
      --muted:rgba(242,244,248,.68);
      --brand:#e50914;
      --brand2:#b20710;
      --shadow:0 20px 60px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, rgba(229,9,20,.18), transparent 35%),
        radial-gradient(circle at 80% 0%, rgba(255,255,255,.05), transparent 30%),
        #07080b;
    }
    .wrap{
      width:min(1400px, 96vw);
      margin:24px auto 60px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:20px;
    }
    h1{
      margin:0;
      font-size:42px;
      letter-spacing:-1.4px;
    }
    .sub{
      color:var(--muted);
      margin-top:4px;
    }
    .btn{
      border:0;
      cursor:pointer;
      padding:10px 14px;
      border-radius:12px;
      color:#fff;
      background:#222838;
      font-weight:700;
    }
    .btn-primary{ background:linear-gradient(180deg,var(--brand),var(--brand2)); }
    .grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap:14px;
      margin-bottom:20px;
    }
    .stat{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
    }
    .stat .k{
      color:var(--muted);
      font-size:13px;
    }
    .stat .v{
      font-size:38px;
      font-weight:900;
      margin-top:8px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      margin-bottom:18px;
      box-shadow:var(--shadow);
    }
    .panel h2{
      margin:0 0 14px;
      font-size:24px;
      letter-spacing:-.5px;
    }
    table{
      width:100%;
      border-collapse:collapse;
    }
    th,td{
      text-align:left;
      padding:12px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:14px;
      vertical-align:top;
    }
    th{
      color:var(--muted);
      font-weight:700;
      position:sticky;
      top:0;
      background:var(--panel);
    }
    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .mini{
      padding:8px 10px;
      border-radius:10px;
      border:0;
      cursor:pointer;
      font-weight:700;
      color:#fff;
      background:#2a3042;
    }
    .danger{ background:#8f0f16; }
    .warn{ background:#7c5c10; }
    .ok{ background:#215b2b; }
    .muted{ color:var(--muted); }
    @media (max-width: 1000px){
      .grid{ grid-template-columns:1fr 1fr; }
    }
    @media (max-width: 700px){
      .grid{ grid-template-columns:1fr; }
      .top{ flex-direction:column; }
      table, thead, tbody, tr, th, td{ display:block; }
      thead{ display:none; }
      tr{ border-bottom:1px solid rgba(255,255,255,.08); padding:10px 0; }
      td{ border:0; padding:6px 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Painel Admin</h1>
        <div class="sub">Gerencie livros, usuários e estatísticas do Bookflix</div>
      </div>
      <div class="actions">
        <button class="btn" onclick="location.href='index.html'">Voltar</button>
        <button class="btn btn-primary" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="grid" id="statsGrid"></div>

    <section class="panel">
      <h2>Livros</h2>
      <div id="booksTable"></div>
    </section>

    <section class="panel">
      <h2>Usuários</h2>
      <div id="usersTable"></div>
    </section>
  </div>

  <script>
    const API = "http://127.0.0.1:4000";

    function token() {
      return localStorage.getItem("token") || "";
    }

    function authHeaders() {
      return {
        Authorization: "Bearer " + token(),
        "Content-Type": "application/json"
      };
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user");
      location.href = "login.html";
    }

    async function getJSON(url, opts = {}) {
      const res = await fetch(url, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "Erro na requisição");
      return data;
    }

    async function loadStats() {
      const data = await getJSON(API + "/api/admin/stats", { headers: authHeaders() });
      document.getElementById("statsGrid").innerHTML = `
        <div class="stat"><div class="k">Usuários</div><div class="v">${data.users}</div></div>
        <div class="stat"><div class="k">Livros</div><div class="v">${data.books}</div></div>
        <div class="stat"><div class="k">Livros ativos</div><div class="v">${data.activeBooks}</div></div>
        <div class="stat"><div class="k">Downloads</div><div class="v">${data.totalDownloads}</div></div>
      `;
    }

    async function loadBooks() {
      const data = await getJSON(API + "/api/admin/books", { headers: authHeaders() });
      document.getElementById("booksTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Autor</th>
              <th>Categoria</th>
              <th>Downloads</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${data.books.map(book => `
              <tr>
                <td>${escapeHtml(book.title || "")}</td>
                <td>${escapeHtml(book.author || "")}</td>
                <td>${escapeHtml(book.category || "")}</td>
                <td>${book.downloads || 0}</td>
                <td>
                  <div class="actions">
                    <button class="mini danger" onclick="deleteBook('${book._id}')">Apagar</button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function loadUsers() {
      const data = await getJSON(API + "/api/admin/users", { headers: authHeaders() });
      document.getElementById("usersTable").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            ${data.users.map(user => `
              <tr>
                <td>${escapeHtml(user.name || "")}</td>
                <td>${escapeHtml(user.email || "")}</td>
                <td>${escapeHtml(user.role || "user")}</td>
                <td>${user.isBanned ? "Banido" : "Ativo"}</td>
                <td>
                  <div class="actions">
                    <button class="mini warn" onclick="toggleBan('${user._id}')">${user.isBanned ? "Desbanir" : "Banir"}</button>
                    <button class="mini ok" onclick="toggleRole('${user._id}')">${user.role === "admin" ? "Virar user" : "Virar admin"}</button>
                  </div>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function deleteBook(id) {
      if (!confirm("Apagar este livro?")) return;
      await getJSON(API + "/api/admin/books/" + id, {
        method: "DELETE",
        headers: authHeaders()
      });
      await refreshAll();
    }

    async function toggleBan(id) {
      await getJSON(API + "/api/admin/users/" + id + "/ban", {
        method: "PATCH",
        headers: authHeaders()
      });
      await refreshAll();
    }

    async function toggleRole(id) {
      await getJSON(API + "/api/admin/users/" + id + "/role", {
        method: "PATCH",
        headers: authHeaders()
      });
      await refreshAll();
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function refreshAll() {
      await Promise.all([loadStats(), loadBooks(), loadUsers()]);
    }

    refreshAll().catch(err => {
      alert(err.message);
      if (/unauthorized|forbidden|token/i.test(err.message)) {
        location.href = "login.html";
      }
    });
  </script>
</body>
</html>
