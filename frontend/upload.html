<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bookflix • Upload</title>

<style>

body{
margin:0;
font-family:system-ui;
color:white;

background:
radial-gradient(circle at 20% 10%, rgba(229,9,20,.25), transparent 40%),
radial-gradient(circle at 90% 10%, rgba(80,140,255,.15), transparent 40%),
#07080b;

height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{

width:650px;

background:rgba(16,18,24,.7);

backdrop-filter:blur(14px);

border-radius:30px;

padding:40px;

box-shadow:0 40px 120px rgba(0,0,0,.8);

border:1px solid rgba(255,255,255,.1);

}

h1{

margin-top:0;
font-size:34px;

}

label{

display:block;
margin-top:15px;
margin-bottom:5px;

font-weight:600;

}

input,textarea{

width:100%;
padding:14px;

border-radius:12px;

border:1px solid rgba(255,255,255,.1);

background:#0f1117;

color:white;

outline:none;

}

input:focus,textarea:focus{

border-color:#e50914;
box-shadow:0 0 0 3px rgba(229,9,20,.25);

}

.file{

margin-top:15px;

padding:25px;

border-radius:15px;

border:2px dashed rgba(255,255,255,.2);

text-align:center;

cursor:pointer;

}

.file:hover{

background:rgba(255,255,255,.05);

}

button{

margin-top:20px;

width:100%;

padding:15px;

font-weight:800;

border:none;

border-radius:14px;

cursor:pointer;

background:linear-gradient(#e50914,#b20710);

color:white;

font-size:16px;

}

button:hover{

transform:scale(1.03);

}

.msg{

margin-top:12px;

color:#aaa;

font-size:14px;

}

</style>

</head>

<body>

<div class="card">

<h1>Enviar Livro</h1>

<label>Título</label>
<input id="title">

<label>Autor</label>
<input id="author">

<label>Categoria</label>
<input id="category">

<label>Descrição</label>
<textarea id="description"></textarea>

<div class="file">

<input type="file" id="file">

</div>

<button id="uploadBtn">Enviar livro</button>

<div class="msg" id="msg"></div>

</div>

<script>

const API="http://localhost:4000"
const msg=document.getElementById("msg")

document.getElementById("uploadBtn").onclick=async()=>{

try{

msg.textContent="Enviando..."

const form=new FormData()

form.append("title",title.value)
form.append("author",author.value)
form.append("category",category.value)
form.append("description",description.value)
form.append("file",file.files[0])

const r=await fetch(API+"/api/books/upload",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:form

})

if(!r.ok) throw new Error("Erro no upload")

msg.textContent="Livro enviado com sucesso!"

}catch(e){

msg.textContent=e.message

}

}

</script>

</body>
</html>
