<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookflix • Upload em Massa</title>
<link rel="stylesheet" href="./assets/css/panel.css" />
</head>
<body>
<div class="card small-card">
  <h1>Upload em Massa</h1>
  <p>Envie um arquivo ZIP com vários livros</p>

  <div class="drop">
    <input type="file" id="zip" accept=".zip">
  </div>

  <button id="send">Enviar ZIP</button>
  <div class="msg" id="msg"></div>
</div>

<script src="./assets/js/config.js"></script>
<script src="./assets/js/bulk.js"></script>
</body>
</html>
