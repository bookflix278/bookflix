<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Bookflix • Upload em Massa</title>

<style>

body{

margin:0;

font-family:system-ui;

color:white;

background:
radial-gradient(circle at 20% 10%, rgba(229,9,20,.25), transparent 40%),
#07080b;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

.card{

width:600px;

background:rgba(16,18,24,.7);

backdrop-filter:blur(14px);

border-radius:30px;

padding:40px;

box-shadow:0 40px 120px rgba(0,0,0,.8);

border:1px solid rgba(255,255,255,.1);

}

h1{

margin-top:0;

font-size:34px;

}

.drop{

margin-top:20px;

padding:40px;

border-radius:18px;

border:2px dashed rgba(255,255,255,.2);

text-align:center;

}

button{

margin-top:20px;

width:100%;

padding:16px;

font-weight:800;

border:none;

border-radius:14px;

cursor:pointer;

background:linear-gradient(#e50914,#b20710);

color:white;

font-size:16px;

}

button:hover{

transform:scale(1.03);

}

.msg{

margin-top:12px;

color:#aaa;

}

</style>

</head>

<body>

<div class="card">

<h1>Upload em Massa</h1>

<p>Envie um arquivo ZIP com vários livros</p>

<div class="drop">

<input type="file" id="zip">

</div>

<button id="send">Enviar ZIP</button>

<div id="msg"></div>

</div>

<script>

const API="http://localhost:4000"

document.getElementById("send").onclick=async()=>{

const form=new FormData()

form.append("file",zip.files[0])

const r=await fetch(API+"/api/books/upload-zip",{

method:"POST",

headers:{
Authorization:"Bearer "+localStorage.getItem("token")
},

body:form

})

if(r.ok){

msg.innerText="ZIP enviado!"

}else{

msg.innerText="Erro no upload"

}

}

</script>

</body>

</html>
